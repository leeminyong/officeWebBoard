<!DOCTYPE html>
<!--
  이 파일은 게시글 목록 화면입니다.
  사용자가 게시글 목록을 보고, 게시판을 바꾸고, 글쓰기 화면으로 이동하는 첫 화면입니다.
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시판</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <h1 data-home-link>📋 게시판</h1>
</header>

<aside class="side-menu" aria-label="주요 메뉴">
  <a class="side-menu-item" data-board-link="project" href="/">프로젝트</a>
  <a class="side-menu-item" data-board-link="maintenance" href="/?board=maintenance">유지보수</a>
  <a class="side-menu-item" data-board-link="app-version" href="/?board=app-version">앱 버전관리</a>
  <a class="side-menu-item" data-board-link="files" href="/?board=files">파일</a>
</aside>

<div class="container">
  <div class="card">
    <div class="toolbar">
      <h2 id="totalInfo">전체 0건</h2>
      <button class="btn btn-primary" id="writeBtn">✏️ 글쓰기</button>
    </div>

    <table class="post-table">
      <thead>
        <tr>
          <th class="center" style="width:60px">번호</th>
          <th>제목</th>
          <th class="center" style="width:100px">작성자</th>
          <th class="center" style="width:130px">작성일</th>
          <th class="center" style="width:60px">파일</th>
        </tr>
      </thead>
      <tbody id="postList"></tbody>
    </table>

    <div id="emptyState" class="empty-state" style="display:none">등록된 게시글이 없습니다.</div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<!-- HTML 주석 문법: 이 설명은 화면에 보이지 않습니다. 목록 화면의 JavaScript는 공식 모듈 방식으로 js/indexPage.js에서 불러옵니다. -->
<script type="module" src="js/indexPage.js"></script>
</body>
</html>
