<!DOCTYPE html>
<!--
  이 파일은 게시글 상세 화면입니다.
  게시글 내용, 첨부파일, 댓글 목록과 댓글 작성 영역을 화면에 배치합니다.
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시글 보기</title>
  <link rel="stylesheet" href="style.css">
  <script src="/marked.js"></script>
</head>
<body>

<header class="site-header">
  <h1 data-home-link>📋 게시판</h1>
</header>

<aside class="side-menu" aria-label="주요 메뉴">
  <a class="side-menu-item" data-board-link="project" href="/">프로젝트</a>
  <a class="side-menu-item" data-board-link="maintenance" href="/?board=maintenance">유지보수</a>
  <a class="side-menu-item" data-board-link="app-version" href="/?board=app-version">앱 버전관리</a>
  <a class="side-menu-item" data-board-link="files" href="/?board=files">파일</a>
</aside>

<div class="container">
  <!-- HTML 주석 문법: 이 설명은 화면에 보이지 않고, 게시글 본문 영역이라는 뜻을 알려주기 위해 적었습니다. -->
  <div class="card" id="postCard">
    <h2 id="postTitle" style="font-size:1.3rem;margin-bottom:12px"></h2>
    <div class="post-meta">
      <!-- HTML 주석 문법: 혼자 사용하는 게시판이라 게시글 작성자 표시는 제거했습니다. -->
      <span>🕒 <span id="postDate"></span></span>
      <span id="updatedBadge" style="display:none;color:#aaa;font-size:.8rem">(수정됨)</span>
    </div>
    <div class="post-content md-body" id="postContent"></div>

    <!-- HTML 주석 문법: 첨부파일 목록은 JavaScript 모듈(viewPage.js)이 서버 데이터를 받아 채워 넣습니다. -->
    <div class="attach-section" id="attachSection" style="display:none">
      <h4>📎 첨부파일</h4>
      <ul class="file-list" id="fileList"></ul>
      <div class="img-preview-grid" id="imgPreviewGrid"></div>
    </div>

    <div class="action-bar" style="margin-top:24px">
      <button class="btn btn-secondary" id="listBtn">← 목록으로</button>
      <div class="right">
        <button class="btn btn-primary btn-sm" id="editBtn">✏️ 수정</button>
        <button class="btn btn-danger btn-sm" id="delBtn">🗑️ 삭제</button>
      </div>
    </div>
  </div>

  <!-- HTML 주석 문법: 댓글 입력과 댓글 목록은 viewPage.js에서 기능별로 처리하도록 분리했습니다. -->
  <div class="card">
    <div class="comment-section">
      <h3>💬 댓글 <span id="commentCount" style="color:#aaa;font-weight:400"></span></h3>
      <div class="comment-list" id="commentList"></div>

      <div class="comment-form">
        <div class="row">
          <!-- HTML 주석 문법: 댓글 작성자 이름 입력칸도 혼자 쓰는 게시판이라 제거했습니다. -->
          <textarea class="form-control" id="cmtContent" placeholder="댓글을 입력하세요" rows="2" style="flex:1;resize:none" maxlength="1000"></textarea>
        </div>
        <div class="file-drop-zone" id="cmtDropZone" style="padding:12px;font-size:.85rem">
          <input type="file" id="cmtFileInput" multiple>
          📎 파일 첨부 (클릭 또는 드래그)
        </div>
        <div class="selected-files" id="cmtSelectedFiles"></div>
        <div class="img-preview-grid" id="cmtImgPreview"></div>
        <button class="btn btn-primary btn-sm" id="submitCommentBtn" style="align-self:flex-end">댓글 등록</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<!-- HTML 주석 문법: type="module"은 JavaScript 파일을 모듈 방식으로 불러오겠다는 뜻입니다. -->
<script type="module" src="js/viewPage.js"></script>
</body>
</html>
