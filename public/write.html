<!DOCTYPE html>
<!--
  이 파일은 글쓰기와 글수정 화면입니다.
  제목, 작성자, 내용, 첨부파일 입력칸을 화면에 배치합니다.
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글쓰기</title>
  <link rel="stylesheet" href="style.css">
  <script src="/marked.js"></script>
  <script src="/turndown.js"></script>
</head>
<body>

<header class="site-header">
  <h1 data-home-link>📋 게시판</h1>
</header>

<div class="container">
  <div class="card">
    <h2 id="pageTitle" style="font-size:1.1rem;margin-bottom:20px;color:#555">✏️ 새 글 작성</h2>

    <!-- HTML 주석 문법: 작성자 입력칸입니다. 실제 저장 동작은 js/writePage.js에서 처리합니다. -->
    <div class="form-group">
      <label for="author">작성자</label>
      <input class="form-control" id="author" placeholder="이름 (미입력 시 익명)" maxlength="30" style="max-width:200px">
    </div>

    <div class="form-group">
      <label for="title">제목 <span style="color:#e74c3c">*</span></label>
      <input class="form-control" id="title" placeholder="제목을 입력하세요" maxlength="200">
    </div>

    <div class="form-group">
      <label>내용 <span style="color:#e74c3c">*</span></label>
      <textarea class="form-control" id="content" placeholder="내용을 입력하세요" style="min-height:300px;resize:vertical;font-family:inherit;font-size:.95rem;line-height:1.6"></textarea>
    </div>

    <!-- HTML 주석 문법: 파일 첨부 화면만 HTML에 두고, 선택/삭제 로직은 js/writePage.js로 분리했습니다. -->
    <div class="form-group">
      <label>파일 첨부 <span style="color:#aaa;font-weight:400;font-size:.82rem">(최대 20개, 파일당 50MB)</span></label>

      <div id="existingFiles" style="display:none;margin-bottom:10px">
        <div style="font-size:.82rem;color:#777;margin-bottom:6px">기존 첨부파일</div>
        <ul class="file-list" id="existingFileList"></ul>
      </div>

      <div class="file-drop-zone" id="dropZone">
        <input type="file" id="fileInput" multiple>
        📁 클릭하거나 파일을 여기로 드래그하세요
      </div>
      <div class="selected-files" id="selectedFiles"></div>
      <div class="img-preview-grid" id="imgPreviewGrid" style="margin-top:10px"></div>
    </div>

    <div class="action-bar">
      <button class="btn btn-secondary" id="cancelBtn">취소</button>
      <button class="btn btn-primary" id="submitBtn">등록</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<!-- HTML 주석 문법: type="module"로 불러오면 writePage.js가 import/export 방식으로 다른 JS 파일을 사용할 수 있습니다. -->
<script type="module" src="js/writePage.js"></script>
</body>
</html>
